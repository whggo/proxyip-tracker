[getIPs]
ranges_url = https://docs.oracle.com/en-us/iaas/tools/public_ip_ranges.json
region_url = https://raw.githubusercontent.com/Netrvin/cloudflare-colo-list/refs/heads/main/DC-Colos.csv
timeout = 1
max_concurrent = 2000
fetch_cidrs_timeout = 30
fetch_colo_timeout = 4
output_file = result/ips.csv

[cfSpeedTest]
file_ips = result/ips.csv
max_ips = 24
max_ping = 896
min_download_speed = 20.0
min_upload_speed = 20.0
test_size = 10240
timeout = 4
ping_workers = 20
output_file = result/tested-ips.csv

[mapDomain]
file_ips = result/ips.csv
file_tests = result/tested-ips.csv
output_file = result/domains-ips.csv

[mapDomain.map]
#Europe        = hiir.cc.cd,5
#Middle_East   = hiir.cc.cd,5
#Africa        = hiir.cc.cd,5
North_America = hiir.cc.cd,5
#South_America = hiir.cc.cd,5
#Asia          = hiir.cc.cd,5
#Asia_Pacific  = hiir.cc.cd,5
#Oceania       = hiir.cc.cd,5

[cfRecUpdate]
api_url = https://api.cloudflare.com/client/v4
zone_id = 2edf370d30f9473098de1b456291f243
file_domains = result/domains-ips.csv
